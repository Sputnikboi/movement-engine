name: Windows Build

on:
  push:
    branches: [master]
  workflow_dispatch:  # lets you trigger a build manually from the Actions tab

env:
  VULKAN_VERSION: "1.3.296.0"

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache Vulkan SDK
        id: cache-vulkan
        uses: actions/cache@v4
        with:
          path: C:\VulkanSDK
          key: vulkan-sdk-${{ env.VULKAN_VERSION }}

      - name: Install Vulkan SDK
        if: steps.cache-vulkan.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $installer = "VulkanSDK-$env:VULKAN_VERSION-Installer.exe"
          Invoke-WebRequest "https://sdk.lunarg.com/sdk/download/$env:VULKAN_VERSION/windows/$installer" -OutFile $installer
          Start-Process -FilePath $installer -Args "--accept-licenses --default-answer --confirm-command install" -Wait

      - name: Set Vulkan environment
        shell: pwsh
        run: |
          echo "VULKAN_SDK=C:\VulkanSDK\$env:VULKAN_VERSION" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "C:\VulkanSDK\$env:VULKAN_VERSION\Bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist
          Copy-Item build\Release\movement_engine.exe dist\
          Copy-Item build\shaders -Destination dist\shaders -Recurse
          Copy-Item assets -Destination dist\assets -Recurse
          Copy-Item levels -Destination dist\levels -Recurse

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: movement-engine-windows
          path: dist\
          retention-days: 14
